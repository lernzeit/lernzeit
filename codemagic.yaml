workflows:
  # Android Release Build
  android-release:
    name: Android Release
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      android_signing:
        - lernzeit_keystore
      groups:
        - google_play
      vars:
        PACKAGE_NAME: "de.lernzeit.app"
      node: 22
      java: 17

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Prepare Android platform
        script: |
          npm install @capacitor/android @capacitor/cli
          echo '{"appId":"de.lernzeit.app","appName":"LernZeit","webDir":"dist"}' > capacitor.config.json
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: Set Android version
        script: |
          LATEST_BUILD_NUMBER=$(google-play get-latest-build-number --package-name "$PACKAGE_NAME" --tracks=production) || LATEST_BUILD_NUMBER=0
          NEW_BUILD_NUMBER=$((LATEST_BUILD_NUMBER + 1))
          echo "Setting versionCode to $NEW_BUILD_NUMBER"
          cd android
          ./gradlew -PversionCode=$NEW_BUILD_NUMBER -PversionName="1.0.$NEW_BUILD_NUMBER"

      - name: Build Android AAB
        script: |
          cd android
          ./gradlew bundleRelease

    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/mapping.txt

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: production
        submit_as_draft: true

  # iOS Release Build
  ios-release:
    name: iOS Release
    max_build_duration: 90
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: lernzeit_asc

    environment:
      ios_signing:
        provisioning_profiles:
          - delernzeitapp_App_Store
        certificates:
          - cert
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_STORE_APP_ID: "6789603688"
      node: 22
      xcode: latest
      cocoapods: default

    scripts:
      - name: Remove OneSignal from package.json
        script: |
          npm uninstall @onesignal/onesignal-cordova-plugin || true

      - name: Install dependencies
        script: |
          rm -rf node_modules package-lock.json
          npm cache clean --force
          npm install

      - name: Update Capacitor
        script: |
          npm install @capacitor/ios@latest @capacitor/cli@latest

      - name: Build web app
        script: npm run build

      - name: Prepare and Sync iOS platform
        script: |
          npm uninstall @onesignal/onesignal-cordova-plugin || true
          echo '{"appId":"de.lernzeit.app","appName":"LernZeit","webDir":"dist"}' > capacitor.config.json
          
          rm -rf ios
          echo "Adding iOS platform..."
          npx cap add ios
          
          echo "Syncing web assets..."
          npx cap sync ios

          # 1. ERZWINGEN: Manuell hochgeladenes Podfile an die richtige Stelle setzen
          if [ -f "ios-icons/Podfile" ]; then
            echo "Injeziere stabiles Git-Podfile..."
            cp ios-icons/Podfile ios/App/Podfile
          fi

          # 2. ERZWINGEN: IconKitchen-Assets reinkopieren
          TARGET_DIR="ios/App/App/Assets.xcassets/AppIcon.appiconset"
          if [ -d "ios-icons" ]; then
            echo "Kopiere App-Icons aus ios-icons..."
            find ios-icons -name "*.png" -o -name "Contents.json" | xargs -I {} cp {} "$TARGET_DIR"/
          fi

          # 3. ERZWINGEN: Xcode-Projektdatei auf das Set eichen
          TARGET_BUILD_SETTINGS="ios/App/App.xcodeproj/project.pbxproj"
          if [ -f "$TARGET_BUILD_SETTINGS" ]; then
            sed -i '' 's/ASSETCATALOG_COMPILER_APPICON_NAME = .*/ASSETCATALOG_COMPILER_APPICON_NAME = AppIcon;/g' "$TARGET_BUILD_SETTINGS" || sed -i 's/ASSETCATALOG_COMPILER_APPICON_NAME = .*/ASSETCATALOG_COMPILER_APPICON_NAME = AppIcon;/g' "$TARGET_BUILD_SETTINGS"
          fi

          # 4. ERZWINGEN: Fehlenden Location-Privacy-String in Info.plist eintragen zur Behebung von ITMS-90683
          PLIST_PATH="ios/App/App/Info.plist"
          if [ -f "$PLIST_PATH" ]; then
            echo "Füge NSLocationWhenInUseUsageDescription zur Info.plist hinzu..."
            /usr/libexec/PlistBuddy -c "Add :NSLocationWhenInUseUsageDescription string 'Diese App benötigt keinen aktiven Zugriff auf Ihren Standort. Die Schnittstelle wird von System-Frameworks bereitgestellt.'" "$PLIST_PATH" || true

            # 5. Export-Compliance: App nutzt ausschließlich Standard-TLS (HTTPS) → exempt.
            # Setzt ITSAppUsesNonExemptEncryption=false, damit TestFlight-Upload nicht
            # mehr mit 422 "Build is missing export compliance" abbricht.
            # Deckt auch die zusätzliche Compliance-Frage für Frankreich ab: da keine
            # nicht-exempte Verschlüsselung genutzt wird, ist keine französische
            # Import-Deklaration nötig.
            echo "Setze ITSAppUsesNonExemptEncryption=false in Info.plist..."
            /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST_PATH" \
              || /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST_PATH"
          fi

      # WICHTIG: Der Entitlements-Patch MUSS nach `npx cap sync ios` und VOR `pod install`
      # sowie `xcode-project use-profiles` laufen. Andernfalls überschreibt Capacitor die
      # project.pbxproj oder das falsche Provisioning Profile wird verlinkt.
      - name: Patch iOS entitlements & ExportOptions (post cap sync)
        script: |
          set -e
          ENTITLEMENTS_PATH="ios/App/App/App.entitlements"
          PBXPROJ_PATH="ios/App/App.xcodeproj/project.pbxproj"

          echo "Schreibe App.entitlements für Sign in with Apple..."
          cat > "$ENTITLEMENTS_PATH" <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
          	<key>aps-environment</key>
          	<string>production</string>
          	<key>com.apple.developer.applesignin</key>
          	<array>
          		<string>Default</string>
          	</array>
          	<key>com.apple.developer.associated-domains</key>
          	<array>
          		<string>applinks:lernzeit.app</string>
          		<string>webcredentials:lernzeit.app</string>
          	</array>
          </dict>
          </plist>
          EOF

          echo "Verlinke Entitlements im Xcode-Projekt mit exakt App/App.entitlements..."
          python3 <<'PY'
          from pathlib import Path
          import re

          pbxproj = Path("ios/App/App.xcodeproj/project.pbxproj")
          text = pbxproj.read_text()
          text = re.sub(r"CODE_SIGN_ENTITLEMENTS = [^;]+;", "CODE_SIGN_ENTITLEMENTS = App/App.entitlements;", text)

          if "CODE_SIGN_ENTITLEMENTS = App/App.entitlements;" not in text:
              text = text.replace(
                  "ASSETCATALOG_COMPILER_APPICON_NAME = AppIcon;\n",
                  "ASSETCATALOG_COMPILER_APPICON_NAME = AppIcon;\n\t\t\t\tCODE_SIGN_ENTITLEMENTS = App/App.entitlements;\n",
                  2,
              )

          pbxproj.write_text(text)
          PY

          if ! grep -q "CODE_SIGN_ENTITLEMENTS = App/App.entitlements;" "$PBXPROJ_PATH"; then
            echo "ERROR: CODE_SIGN_ENTITLEMENTS ist nicht exakt auf App/App.entitlements gesetzt."
            exit 1
          fi

          echo "--- Entitlements-Datei am erwarteten Pfad ---"
          ls -la "$ENTITLEMENTS_PATH"

          echo "--- CODE_SIGN_ENTITLEMENTS Treffer in project.pbxproj (erwartet: genau 2) ---"
          grep -n "CODE_SIGN_ENTITLEMENTS" "$PBXPROJ_PATH" || true
          MATCH_COUNT=$(grep -c "CODE_SIGN_ENTITLEMENTS = App/App.entitlements;" "$PBXPROJ_PATH" || true)
          echo "Treffer: $MATCH_COUNT"
          if [ "$MATCH_COUNT" -ne 2 ]; then
            echo "ERROR: Erwartet 2 Treffer (Debug + Release), gefunden: $MATCH_COUNT"
            exit 1
          fi

          echo "--- Integritätsprüfung der project.pbxproj ---"
          plutil -lint "$PBXPROJ_PATH" || { echo "ERROR: project.pbxproj ist beschädigt (plutil)."; exit 1; }

          echo "--- xcodebuild -list Sanity-Check ---"
          xcodebuild -list -workspace ios/App/App.xcworkspace 2>&1 | tee /tmp/xcodebuild_list.txt || {
            echo "Workspace noch nicht generiert (vor pod install) — versuche Projekt direkt..."
            xcodebuild -list -project ios/App/App.xcodeproj || { echo "ERROR: project.pbxproj ist beschädigt (xcodebuild)."; exit 1; }
          }

          EXPORT_OPTIONS_PATH="ios/App/ExportOptions.plist"
          echo "Schreibe explizite App-Store ExportOptions.plist (manuelles Signing mit Profil-Mapping)..."
          cat > "$EXPORT_OPTIONS_PATH" <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
          	<key>method</key>
          	<string>app-store</string>
          	<key>signingStyle</key>
          	<string>manual</string>
          	<key>teamID</key>
          	<string>367Y2UUXJG</string>
          	<key>provisioningProfiles</key>
          	<dict>
          		<key>de.lernzeit.app</key>
          		<string>delernzeitapp_App_Store</string>
          	</dict>
          	<key>uploadSymbols</key>
          	<true/>
          	<key>compileBitcode</key>
          	<false/>
          </dict>
          </plist>
          EOF

      - name: Install CocoaPods dependencies
        script: |
          cd ios/App
          echo "Removing old Pod cache..."
          rm -rf Pods Podfile.lock
          
          echo "Updating CocoaPods repository..."
          pod repo update
          
          echo "Installing Pods..."
          pod install --repo-update

          if [ ! -d "App.xcworkspace" ]; then
            echo "ERROR: App.xcworkspace not created!"
            exit 1
          fi

      - name: Fetch signing files
        script: |
          xcode-project use-profiles

      - name: Set iOS version
        script: |
          cd ios/App
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID") || LATEST_BUILD_NUMBER=0
          NEW_BUILD_NUMBER=$((LATEST_BUILD_NUMBER + 1))
          echo "Setting build number to $NEW_BUILD_NUMBER"
          agvtool new-version -all $NEW_BUILD_NUMBER

      - name: Verify Sign in with Apple entitlements
        script: |
          set -e
          ENTITLEMENTS_PATH="ios/App/App/App.entitlements"
          PBXPROJ_PATH="ios/App/App.xcodeproj/project.pbxproj"

          echo "Prüfe Entitlements-Datei und Xcode-Release-Build-Settings..."
          test -f "$ENTITLEMENTS_PATH"
          test -f "ios/App/ExportOptions.plist"
          grep -q "CODE_SIGN_ENTITLEMENTS = App/App.entitlements;" "$PBXPROJ_PATH"
          /usr/libexec/PlistBuddy -c "Print :com.apple.developer.applesignin:0" "$ENTITLEMENTS_PATH" | grep -q "Default"
          /usr/libexec/PlistBuddy -c "Print :method" "ios/App/ExportOptions.plist" | grep -q "app-store"

          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -showBuildSettings > /tmp/app_release_build_settings.txt
          grep "CODE_SIGN_ENTITLEMENTS = App/App.entitlements" /tmp/app_release_build_settings.txt

      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --export-options-plist "ios/App/ExportOptions.plist" \
            --clean || {
              echo "=== XCODEBUILD ERROR LOG ==="
              if ls /tmp/xcodebuild_logs/*.log >/dev/null 2>&1; then
                grep -B 5 -A 20 "error:" /tmp/xcodebuild_logs/*.log | tail -200
                echo "=== TAIL DES LETZTEN LOGS ==="
                tail -200 "$(ls -t /tmp/xcodebuild_logs/*.log | head -n 1)"
              else
                echo "Keine xcodebuild-Logs unter /tmp/xcodebuild_logs gefunden."
              fi
              exit 1
            }

      - name: Verify Sign in with Apple in final IPA
        script: |
          set -e
          echo "Suche exportierte .ipa..."
          IPA_PATH=$(ls build/ios/ipa/*.ipa 2>/dev/null | head -n 1)
          if [ -z "$IPA_PATH" ]; then
            IPA_PATH=$(find . -name "*.ipa" -path "*/ipa/*" 2>/dev/null | head -n 1)
          fi
          if [ -z "$IPA_PATH" ] || [ ! -f "$IPA_PATH" ]; then
            echo "ERROR: Keine .ipa gefunden."
            exit 1
          fi
          echo "Prüfe IPA: $IPA_PATH"

          rm -rf /tmp/ipa
          mkdir -p /tmp/ipa
          unzip -q "$IPA_PATH" -d /tmp/ipa

          APP_BUNDLE=$(ls -d /tmp/ipa/Payload/*.app | head -n 1)
          echo "App-Bundle: $APP_BUNDLE"

          echo "--- Signierte Entitlements ---"
          codesign -d --entitlements :- "$APP_BUNDLE" > /tmp/app_signed_entitlements.plist 2>/dev/null || true
          cat /tmp/app_signed_entitlements.plist
          grep -q "com.apple.developer.applesignin" /tmp/app_signed_entitlements.plist \
            || { echo "ERROR: applesignin fehlt in signierten Entitlements der IPA."; exit 1; }

          echo "--- Embedded Provisioning Profile ---"
          security cms -D -i "$APP_BUNDLE/embedded.mobileprovision" > /tmp/embedded_profile.plist
          grep -A2 "applesignin" /tmp/embedded_profile.plist \
            || { echo "ERROR: applesignin fehlt im embedded.mobileprovision."; exit 1; }

          echo "OK: Sign in with Apple ist in Entitlements und Provisioning Profile der IPA enthalten."

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - ios/App/App.xcarchive
      - /tmp/app_signed_entitlements.plist
      - /tmp/embedded_profile.plist

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  # Development Build (für Testing)
  development:
    name: Development Build
    max_build_duration: 30
    instance_type: linux_x2

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'develop'
          include: true

    environment:
      node: 22
      java: 17

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Run tests
        script: npm run test --if-present

      - name: Build web app
        script: npm run build

      - name: Add Android platform
        script: |
          echo '{"appId":"de.lernzeit.app","appName":"LernZeit","webDir":"dist"}' > capacitor.config.json
          npx cap add android || true
          npx cap sync android

      - name: Build debug APK
        script: |
          cd android
          ./gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/**/*.apk
